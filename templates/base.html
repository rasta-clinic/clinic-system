<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>کلینیک رستا</title>

    <!-- فونت فارسی -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #f8fafc;
            color: #0f172a;
        }

        /* ===== TOPBAR ===== */

        .topbar {
            height: 70px;
            background: white;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            position: fixed;
            top: 0;
            right: 0;
            left: 0;
            z-index: 1000;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .clinic-logo {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: #2563eb;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .clinic-name {
            font-size: 18px;
            font-weight: 700;
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
        }

        /* ===== SIDEBAR ===== */

        .sidebar {
            width: 260px;
            height: 100vh;
            background: white;
            position: fixed;
            top: 70px;
            right: 0;
            border-left: 1px solid #e2e8f0;
            padding-top: 20px;
            overflow-y: auto;
            transition: 0.3s;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            padding: 14px 22px;
            margin: 6px 12px;
            border-radius: 12px;
            text-decoration: none;
            color: #334155;
            font-size: 15px;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #eff6ff;
            color: #2563eb;
        }

        /* ===== CONTENT ===== */

        .content {
            margin-right: 260px;
            padding: 95px 25px 25px;
        }

        /* ===== CARD ===== */

        .card {
            background: white;
            border-radius: 18px;
            padding: 22px;
            margin-bottom: 22px;
            box-shadow: 0 2px 10px rgba(15, 23, 42, 0.05);
        }

        /* ===== BUTTON ===== */

        .btn {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 18px;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        /* ===== TABLE ===== */

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th {
            background: #f1f5f9;
            color: #334155;
            font-weight: 600;
        }

        th,
        td {
            padding: 16px;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
        }

        tr:hover {
            background: #f8fafc;
        }

        /* ===== MOBILE ===== */

        @media (max-width: 768px) {

            .menu-btn {
                display: block;
            }

            .sidebar {
                right: -270px;
                z-index: 2000;
                top: 70px;
            }

            .sidebar.active {
                right: 0;
            }

            .content {
                margin-right: 0;
                padding: 90px 15px 20px;
            }

            .topbar {
                padding: 0 14px;
            }

            .clinic-name {
                font-size: 16px;
            }

            .card {
                padding: 16px;
                border-radius: 16px;
            }

            th,
            td {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <!-- TOPBAR -->

    <div class="topbar">

        <div class="topbar-right">

            <button class="menu-btn" onclick="toggleSidebar()">
                ☰
            </button>

            <div class="clinic-logo">
                ر
            </div>

            <div class="clinic-name">
                کلینیک روانشناسی رستا
            </div>

        </div>

        <div>
            پنل مدیریت
        </div>

    </div>

    <!-- SIDEBAR -->

    <div class="sidebar" id="sidebar">

        <a href="/admin">داشبورد</a>

        <a href="/calendar">تقویم</a>

        <a href="/weekly-calendar">تقویم هفتگی</a>

        <a href="/appointments">نوبت‌ها</a>

        <a href="/patients">بیماران</a>

        <a href="/therapists">درمانگران</a>

        <a href="/reports">گزارش‌ها</a>

        <a href="/logout">خروج</a>

    </div>

    <!-- CONTENT -->

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <script>

        function toggleSidebar() {
            document.getElementById("sidebar").classList.toggle("active");
        }

    </script>

</body>

</html>
