<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monthly Reports</title>

<style>
body {
    font-family: Arial;
    background: #f4f6f9;
    margin: 0;
}

.header {
    background: #1f2d3d;
    color: white;
    padding: 20px;
    display: flex;
    justify-content: space-between;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    border-bottom: 1px solid #ddd;
}
</style>
</head>

<body>

<div class="header">
    <div>Monthly Reports</div>
    <div><a href="/admin" style="color:white;">Back</a></div>
</div>

<div class="container">

<div class="card">
<h2>Therapist Sessions This Month</h2>

<table>
<tr>
    <th>Therapist</th>
    <th>Total Sessions</th>
</tr>

{% for r in report %}
<tr>
    <td>{{ r[0] }}</td>
    <td>{{ r[1] }}</td>
</tr>
{% endfor %}

</table>

</div>

</div>

</body>
</html>
