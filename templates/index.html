<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>پنل مدیریت کلینیک</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:tahoma;
    }

    body{
      background:#f5f7fb;
      color:#222;
    }

    .container{
      display:flex;
      min-height:100vh;
    }

    .sidebar{
      width:260px;
      background:#111827;
      color:white;
      padding:30px 20px;
    }

    .logo{
      font-size:28px;
      font-weight:bold;
      margin-bottom:40px;
    }

    .menu{
      list-style:none;
    }

    .menu li{
      margin-bottom:18px;
      font-size:18px;
      cursor:pointer;
    }

    .content{
      flex:1;
      padding:40px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .title{
      font-size:32px;
      font-weight:bold;
    }

    .cards{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:20px;
      margin-bottom:40px;
    }

    .card{
      background:white;
      border-radius:18px;
      padding:25px;
      box-shadow:0 4px 15px rgba(0,0,0,.08);
    }

    .card h3{
      margin-bottom:15px;
      color:#666;
      font-size:18px;
    }

    .card p{
      font-size:30px;
      font-weight:bold;
    }

    .form-box{
      background:white;
      padding:25px;
      border-radius:18px;
      box-shadow:0 4px 15px rgba(0,0,0,.08);
      margin-bottom:30px;
    }

    .form-box h2{
      margin-bottom:20px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
    }

    input,select{
      padding:14px;
      border-radius:10px;
      border:1px solid #ddd;
      font-size:16px;
    }

    button{
      background:#2563eb;
      color:white;
      border:none;
      padding:14px;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
    }

    table{
      width:100%;
      background:white;
      border-radius:18px;
      overflow:hidden;
      border-collapse:collapse;
      box-shadow:0 4px 15px rgba(0,0,0,.08);
    }

    table th{
      background:#111827;
      color:white;
      padding:16px;
    }

    table td{
      padding:16px;
      border-bottom:1px solid #eee;
      text-align:center;
    }

    @media(max-width:900px){
      .container{
        flex-direction:column;
      }

      .sidebar{
        width:100%;
      }

      .form-grid{
        grid-template-columns:1fr;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <div class="logo">کلینیک</div>

    <ul class="menu">
      <li>داشبورد</li>
      <li>نوبت ها</li>
      <li>درمانگران</li>
      <li>مالی</li>
      <li>مراجعین</li>
    </ul>
  </div>

  <div class="content">

    <div class="top">
      <div class="title">پنل مدیریت کلینیک</div>
    </div>

    <div class="cards">

      <div class="card">
        <h3>درآمد امروز</h3>
        <p>۵,۸۰۰,۰۰۰</p>
      </div>

      <div class="card">
        <h3>تعداد نوبت امروز</h3>
        <p>۱۸</p>
      </div>

      <div class="card">
        <h3>درمانگران فعال</h3>
        <p>۶</p>
      </div>

    </div>

    <div class="form-box">

      <h2>ثبت نوبت جدید</h2>

      <div class="form-grid">
        <input type="text" placeholder="نام مراجعه کننده">
        <input type="text" placeholder="نام درمانگر">
        <input type="time">
        <input type="number" placeholder="مبلغ">
        
        <select>
          <option>وضعیت پرداخت</option>
          <option>پرداخت شده</option>
          <option>پرداخت نشده</option>
        </select>

        <button>ثبت نوبت</button>
      </div>

    </div>

    <table>

      <thead>
        <tr>
          <th>مراجع</th>
          <th>درمانگر</th>
          <th>ساعت</th>
          <th>پرداخت</th>
        </tr>
      </thead>

      <tbody>

        <tr>
          <td>علی رضایی</td>
          <td>دکتر احمدی</td>
          <td>۱۸:۳۰</td>
          <td>پرداخت شده</td>
        </tr>

        <tr>
          <td>سارا محمدی</td>
          <td>دکتر کریمی</td>
          <td>۲۰:۰۰</td>
          <td>پرداخت نشده</td>
        </tr>

      </tbody>

    </table>

  </div>

</div>

</body>
</html>
