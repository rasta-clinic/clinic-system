<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Rasta Clinic</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            display: flex;
        }

        .sidebar {
            width: 240px;
            background: #2D3E50;
            color: white;
            height: 100vh;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 40px;
        }

        .sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.1);
        }

        .main {
            flex: 1;
            padding: 30px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            text-align: center;
        }

        .card h3 {
            margin: 0;
            color: #555;
        }

        .card p {
            font-size: 28px;
            margin-top: 10px;
            font-weight: bold;
        }

        .table-box {
            background: white;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f9fafc;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Rasta Clinic</h2>
    <a href="/admin">Dashboard</a>
    <a href="/appointments">Appointments</a>
    <a href="/patients">Patients</a>
    <a href="/therapists">Therapists</a>
    <a href="/login">Logout</a>
</div>

<div class="main">
    <h1>Admin Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h3>Therapists</h3>
            <p>12</p>
        </div>

        <div class="card">
            <h3>Today Appointments</h3>
            <p>28</p>
        </div>

        <div class="card">
            <h3>Patients</h3>
            <p>145</p>
        </div>

        <div class="card">
            <h3>Revenue</h3>
            <p>$2,400</p>
        </div>
    </div>

    <div class="table-box">
        <h2>Today Schedule</h2>

        <table>
            <tr>
                <th>Patient</th>
                <th>Therapist</th>
                <th>Time</th>
            </tr>
