<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <title>ورود به پنل کلینیک</title>

    <style>
        body {
            direction: rtl;
            font-family: Tahoma;
            background: #f5f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            width: 300px;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #2f80ed;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1366d6;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>ورود به سیستم</h2>

        <form method="POST">

            <input type="text" name="username" placeholder="نام کاربری" required>

            <input type="password" name="password" placeholder="رمز عبور" required>

            <button type="submit">
                ورود
            </button>

        </form>
    </div>

</body>

</html>
