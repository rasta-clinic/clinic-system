<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rasta Clinic Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7fb;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 340px;
            text-align: center;
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            color: gray;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2f80ed;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            margin-top: 10px;
        }

        button:hover {
            cursor: pointer;
            opacity: 0.9;
        }

        .demo {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
            text-align: left;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h1>Rasta Clinic</h1>
    <p>Management System</p>

    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="demo">
        <b>Admin:</b> admin / 1234<br>
        <b>Reception:</b> reception / 1234<br>
        <b>Therapist نمونه:</b> sara / 1234
    </div>
</div>

</body>
</html>
